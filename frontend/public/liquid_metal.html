<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Metal | Soft UI Hero</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Syne & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- GSAP & Paper.js (CDNs) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>

    <style>
        /* Custom Properties & Reset */
        :root {
            --bg-color: #eef0f3;
            --text-dark: #1a1a1c;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.8);
            --shadow-light: rgba(255, 255, 255, 0.9);
            --shadow-dark: rgba(180, 185, 195, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            cursor: none;
            /* Hide default for custom cursor */
        }

        h1,
        h2,
        h3,
        .font-syne {
            font-family: 'Syne', sans-serif;
        }

        /* --- Custom Cursor --- */
        #cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 16px;
            height: 16px;
            background: #1a1a1c;
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: difference;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background-color 0.3s;
            will-change: transform;
        }

        #cursor.hover-active {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 1);
            mix-blend-mode: difference;
        }

        /* --- Noise / Grain Overlay --- */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.25;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* --- Paper.js Canvas Background --- */
        #liquid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            /* Let clicks pass through */
        }

        /* --- Glassmorphism UI --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow:
                10px 10px 30px var(--shadow-dark),
                -10px -10px 30px var(--shadow-light),
                inset 1px 1px 2px rgba(255, 255, 255, 0.9);
        }

        /* --- Typography Gradients --- */
        .text-metallic {
            background: linear-gradient(135deg, #1a1a1c 0%, #6b7078 50%, #1a1a1c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.05em;
        }

        /* --- The Liquid Metal Button ("Only Paper" style) --- */
        .btn-metal-container {
            position: relative;
            display: inline-flex;
            padding: 3px;
            /* border thickness */
            border-radius: 9999px;
            background: #e0e5ec;
            overflow: hidden;
            box-shadow:
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
            cursor: none;
            /* Let custom cursor handle hovering */
        }

        /* Spinning Conic Gradient for the Border Edge */
        .btn-metal-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.8) 10%,
                    rgba(200, 205, 215, 1) 20%,
                    rgba(255, 255, 255, 0.8) 30%,
                    transparent 40%,
                    rgba(255, 255, 255, 0.8) 60%,
                    rgba(200, 205, 215, 1) 70%,
                    rgba(255, 255, 255, 0.8) 80%,
                    transparent 90%);
            animation: spin 4s linear infinite;
            z-index: 1;
        }

        /* Chromatic Aberration Underlay */
        .btn-chromatic {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg,
                    transparent 0%,
                    rgba(255, 0, 0, 0.15) 20%,
                    rgba(0, 0, 255, 0.15) 30%,
                    transparent 40%,
                    rgba(255, 0, 0, 0.15) 70%,
                    rgba(0, 0, 255, 0.15) 80%,
                    transparent 100%);
            animation: spin 4s linear infinite reverse;
            z-index: 1;
            mix-blend-mode: screen;
        }

        /* Inner Pill (The actual button surface) */
        .btn-metal-inner {
            position: relative;
            z-index: 2;
            background: linear-gradient(145deg, #ffffff, #e6e9ef);
            border-radius: 9999px;
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.125rem;
            color: var(--text-dark);
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
            box-shadow: inset 2px 2px 5px rgba(255, 255, 255, 1), inset -2px -2px 5px rgba(180, 185, 195, 0.2);
            overflow: hidden;
        }

        /* White Specular Highlight Line inside Button */
        .btn-metal-inner::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            transform: skewX(-20deg);
            animation: shine 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
        }

        .btn-metal-container:hover .btn-metal-inner {
            background: linear-gradient(145deg, #f0f2f5, #ffffff);
            transform: scale(0.98);
            box-shadow: inset 4px 4px 10px rgba(180, 185, 195, 0.3), inset -4px -4px 10px rgba(255, 255, 255, 1);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            20% {
                left: 200%;
            }

            100% {
                left: 200%;
            }
        }

        /* --- Image Card Styling --- */
        .img-card {
            border-radius: 2rem;
            overflow: hidden;
            position: relative;
            /* Filter to assimilate into monochrome metallic theme */
            filter: grayscale(80%) contrast(110%) brightness(1.05);
            transition: filter 0.5s ease;
        }

        .img-card:hover {
            filter: grayscale(40%) contrast(120%) brightness(1.1);
        }

        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.05);
            /* Slight scale for parallax room */
        }

        /* GSAP Text Reveal Containers */
        .reveal-overflow {
            overflow: hidden;
            display: inline-block;
            vertical-align: top;
        }

        .reveal-text {
            display: inline-block;
            transform: translateY(110%) skewY(10deg);
            opacity: 0;
        }
    </style>
</head>

<body class="antialiased selection:bg-gray-300 selection:text-black">

    <!-- Custom Cursor -->
    <div id="cursor"></div>

    <!-- Global Noise Overlay -->
    <div class="noise-overlay"></div>

    <!-- Paper.js Interactive Canvas -->
    <canvas id="liquid-canvas" resize></canvas>

    <!-- Main Wrapper -->
    <div class="relative z-10 flex flex-col min-h-screen">

        <!-- Floating Navigation Bar -->
        <nav
            class="fixed top-8 left-1/2 -translate-x-1/2 w-[90%] max-w-5xl rounded-full glass-panel px-8 py-4 flex justify-between items-center z-50 nav-anim opacity-0 translate-y-[-20px]">
            <div class="font-syne font-bold text-xl tracking-tighter interactive-el">ONLY PAPER</div>
            <ul class="flex gap-8 text-sm font-medium interactive-el">
                <li class="cursor-pointer hover:text-gray-500 transition-colors">Manifesto</li>
                <li class="cursor-pointer hover:text-gray-500 transition-colors">Liquid UI</li>
                <li class="cursor-pointer hover:text-gray-500 transition-colors">Vision</li>
            </ul>
            <div
                class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-md cursor-pointer interactive-el hover:scale-105 transition-transform">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </div>
        </nav>

        <!-- Hero Content Section -->
        <main class="flex-grow flex items-center justify-center px-6 lg:px-20 pt-32 pb-20 relative">
            <div class="container mx-auto grid grid-cols-1 lg:grid-cols-12 gap-16 items-center">

                <!-- Left: Text & CTA -->
                <div class="lg:col-span-6 flex flex-col items-start z-20">
                    <div
                        class="mb-4 text-sm tracking-widest uppercase text-gray-400 font-medium pl-1 relative reveal-overflow">
                        <span class="reveal-text">Soft UI Architecture</span>
                    </div>

                    <h1 class="text-6xl lg:text-8xl font-syne font-extrabold leading-[0.9] mb-8">
                        <div class="reveal-overflow"><span class="reveal-text text-metallic">Beyond</span></div><br />
                        <div class="reveal-overflow"><span class="reveal-text text-metallic">Digital</span></div><br />
                        <div class="reveal-overflow"><span class="reveal-text text-metallic">Surfaces.</span></div>
                    </h1>

                    <div class="reveal-overflow mb-12 max-w-md">
                        <p class="reveal-text text-gray-500 text-lg leading-relaxed font-light">
                            Crafting immaculate digital experiences through precision geometry, fluid dynamics, and
                            refractive light rendering. Enter the next generation of spatial interfaces.
                        </p>
                    </div>

                    <!-- The Masterpiece Button -->
                    <div class="reveal-overflow pt-2">
                        <div class="reveal-text">
                            <a href="academy.html" class="btn-metal-container interactive-el">
                                <div class="btn-chromatic"></div>
                                <div class="btn-metal-inner">
                                    Initialize Sequence
                                </div>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Right: Asymmetrical Image Composition -->
                <div
                    class="lg:col-span-6 relative h-[600px] w-full flex items-center justify-center pointer-events-none">

                    <!-- Main Card -->
                    <div class="absolute w-64 h-80 lg:w-80 lg:h-96 glass-panel img-card z-20 right-[10%] parallax-layer"
                        data-speed="0.05">
                        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop"
                            alt="Abstract Chrome Geometry">
                    </div>

                    <!-- Secondary Floating Card -->
                    <div class="absolute w-48 h-64 glass-panel img-card z-10 left-[10%] top-[10%] parallax-layer"
                        data-speed="-0.03">
                        <img src="https://images.unsplash.com/photo-1620121692029-d088224ddc74?q=80&w=2664&auto=format&fit=crop"
                            alt="Fluid Glass">
                    </div>

                    <!-- Tertiary Small Detail -->
                    <div class="absolute w-32 h-32 rounded-full glass-panel img-card z-30 bottom-[15%] left-[30%] parallax-layer"
                        data-speed="0.08">
                        <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2670&auto=format&fit=crop"
                            alt="Metallic Detail">
                    </div>

                </div>
            </div>
        </main>

    </div>

    <!-- Scripts -->
    <script>
        // --- 1. Custom Cursor Logic ---
        const cursor = document.getElementById('cursor');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let cursorX = mouseX;
        let cursorY = mouseY;

        // Smooth cursor follow (Lerp)
        function renderCursor() {
            cursorX += (mouseX - cursorX) * 0.2;
            cursorY += (mouseY - cursorY) * 0.2;
            cursor.style.transform = `translate(${cursorX}px, ${cursorY}px)`;
            requestAnimationFrame(renderCursor);
        }
        requestAnimationFrame(renderCursor);

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Hover effect for interactive elements
        const iteractives = document.querySelectorAll('.interactive-el');
        iteractives.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover-active'));
        });


        // --- 2. GSAP Epic Entrance Timeline ---
        window.addEventListener("load", () => {
            const tl = gsap.timeline({ defaults: { ease: "power4.out" } });

            // Ensure navbar is visible
            gsap.set('.nav-anim', { opacity: 0, y: -20 });

            tl.to('.nav-anim', {
                opacity: 1,
                y: 0,
                duration: 1.2,
                delay: 0.2
            })
                .to('.reveal-text', {
                    y: "0%",
                    skewY: 0,
                    opacity: 1,
                    duration: 1.2,
                    stagger: 0.1
                }, "-=0.8")
                .from('.img-card', {
                    y: 100,
                    opacity: 0,
                    duration: 1.5,
                    stagger: 0.2,
                    rotate: 2,
                    scale: 0.95
                }, "-=1.2");
        });


        // --- 3. Custom Parallax Math for 3D Float Effect ---
        const parallaxLayers = document.querySelectorAll('.parallax-layer');
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2);
            const y = (e.clientY - window.innerHeight / 2);

            parallaxLayers.forEach(layer => {
                const speed = parseFloat(layer.getAttribute('data-speed'));
                gsap.to(layer, {
                    x: x * speed,
                    y: y * speed,
                    rotateX: -y * speed * 0.02,
                    rotateY: x * speed * 0.02,
                    duration: 1,
                    ease: "power2.out"
                });
            });
        });


        // --- 4. Paper.js Liquid Silver Background Physics ---
        paper.install(window);
        window.onload = function () {
            paper.setup('liquid-canvas');

            // Create a fluid blob in the center
            const center = view.center;
            const radius = Math.min(view.size.width, view.size.height) * 0.4;
            const segments = 12;

            const path = new Path.RegularPolygon(center, segments, radius);
            path.fillColor = {
                gradient: {
                    stops: [
                        [new Color(230 / 255, 234 / 255, 240 / 255, 1), 0],
                        [new Color(255 / 255, 255 / 255, 255 / 255, 0.4), 1]
                    ],
                    radial: true
                },
                origin: path.position,
                destination: path.bounds.rightCenter
            };
            path.smooth({ type: 'continuous' });

            // Physics arrays
            const springs = [];

            // Store original positions mapping to points
            path.segments.forEach(segment => {
                segment.customHome = segment.point.clone();
                segment.customVel = new Point(0, 0);
            });

            view.onFrame = function (event) {
                // Morphing gradient origin slightly
                path.fillColor.origin = path.position + new Point(Math.sin(event.time) * 50, Math.cos(event.time) * 50);

                const mousePos = new Point(mouseX, mouseY);

                path.segments.forEach((segment, i) => {
                    const home = segment.customHome;

                    // Organic breathing movement (Sine wave based on index and time)
                    const breathX = Math.sin(event.time * 2 + i) * 15;
                    const breathY = Math.cos(event.time * 1.5 + i) * 15;
                    const target = home + new Point(breathX, breathY);

                    // Magnetic repulsion from mouse
                    const distToMouse = mousePos.getDistance(segment.point);
                    let push = new Point(0, 0);
                    if (distToMouse < 300) {
                        const force = (300 - distToMouse) / 300; // 0 to 1
                        const dir = segment.point - mousePos;
                        dir.length = force * 60; // Max push distance
                        push = dir;
                    }

                    const finalTarget = target + push;

                    // Spring physics (Hooke's law + damping)
                    const springForce = (finalTarget - segment.point) * 0.05;
                    segment.customVel += springForce;
                    segment.customVel *= 0.85; // friction / damping

                    segment.point += segment.customVel;
                });

                path.smooth({ type: 'continuous' });
            };

            view.onResize = function (event) {
                // simple resize handling (re-center)
                path.position = view.center;
                // update home points roughly
                const rad = Math.min(view.size.width, view.size.height) * 0.4;
                path.segments.forEach((seg, i) => {
                    const a = (i / segments) * Math.PI * 2;
                    seg.customHome = view.center + new Point(Math.cos(a) * rad, Math.sin(a) * rad);
                });
            }
        };
    </script>
</body>

</html>
